<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Todo App</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container mt-5">

<h1 class="text-center mb-4">My Todo App</h1>

<div class="input-group mb-3">
<input type="text" id="taskInput" class="form-control" placeholder="Enter a task">
<button class="btn btn-primary" id="addTaskBtn">Add Task</button>
</div>

<div class="text-center mb-3">
<button class="btn btn-outline-dark filter-btn" data-filter="all">All</button>
<button class="btn btn-outline-success filter-btn" data-filter="completed">Completed</button>
<button class="btn btn-outline-warning filter-btn" data-filter="pending">Pending</button>
</div>

<ul class="list-group" id="taskList"></ul>

</div>

<script src="js/script.js"></script>

</body>
</html>
